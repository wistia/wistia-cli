name: Generate
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDKs
        type: boolean
        default: false
      set_version:
        description: optionally set a specific SDK version
        type: string
  repository_dispatch:
    types: [oas-updated]
  schedule:
    - cron: 0 0 * * *
  pull_request:
    types:
      - labeled
      - unlabeled
jobs:
  # Generation uses Speakeasy's automatic (Go-safe semver) versioning. We do NOT
  # feed a dated 2026.x version in here: a major version >= 2 triggers Go's /vN
  # module-suffix rule, which Speakeasy applies inconsistently to the CLI target
  # (imports get /v2026 but go.mod does not) and the build fails to compile.
  # The dated version is applied at RELEASE time instead (git tag + GoReleaser
  # ldflags), decoupled from the Go module path. See the release/publish workflow.
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force || github.event_name == 'repository_dispatch' }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
