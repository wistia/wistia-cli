name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Patch goreleaser for public release
        # Speakeasy regenerates .goreleaser.yaml targeting the private source repo.
        # Redirect the release to the public homebrew tap repo so assets are
        # downloadable without auth, and strip the private-repo download strategy.
        run: |
          # Speakeasy sets release.github.name to wistia-cli (the source repo).
          # Redirect it to homebrew-wistia-cli so release assets are downloadable
          # without auth (needed for Homebrew formula download URLs).
          sed -i 's/^    name: wistia-cli$/    name: homebrew-wistia-cli/' .goreleaser.yaml
          sed -i '/download_strategy:/d' .goreleaser.yaml
          sed -i '/custom_require:/d' .goreleaser.yaml

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          # HOMEBREW_TAP_GITHUB_TOKEN needs Contents: Read and write on
          # wistia/homebrew-wistia-cli (for both the release assets and the formula).
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Create release on source repo
        # GoReleaser publishes to homebrew-wistia-cli for Homebrew downloads.
        # Mirror a release here so it shows up on wistia/wistia-cli's Releases page.
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          gh release upload "${{ github.ref_name }}" dist/*.tar.gz dist/*.zip dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-artifacts
          path: |
            dist/
            !dist/*.txt
          retention-days: 30
