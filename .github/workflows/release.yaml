name: Release

on:
  push:
    branches:
      - 'v20[0-9][0-9]-[0-9][0-9]'
    paths:
      - .speakeasy/gen.lock
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Gate the release on the test suite (reusable workflow). A release only
  # proceeds if tests pass.
  tests:
    uses: ./.github/workflows/test-integration.yaml
    secrets:
      WISTIA_API_KEY: ${{ secrets.WISTIA_API_KEY }}

  release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Compute dated release version
        id: version
        run: |
          version="$(scripts/compute-version.sh)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version} (branch ${GITHUB_REF_NAME})"

      - name: Create tag (local only — dry)
        run: |
          # GoReleaser derives the version from the tag at HEAD. We create it locally
          # so ldflags stamp the dated version, but do NOT push it (dry). Real mode
          # pushes the tag. Annotated tags need a committer identity, which the CI
          # runner lacks by default.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "Release v${{ steps.version.outputs.version }}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::001688053317:role/github-cicd-wistia-cli
          aws-region: us-east-1

      - name: Fetch Homebrew tap token
        id: secrets
        run: |
          TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id glass/homebrew-tap-token \
            --query SecretString --output text | jq -r '.token')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser (dry — build, no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pinned: `brews` is deprecated/being removed; v2.16.0 still supports it.
          version: "v2.16.0"
          args: release --clean --skip=publish,homebrew,announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.secrets.outputs.token }}

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-${{ steps.version.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 14
