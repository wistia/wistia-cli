name: Release

# Releases originate ONLY from version branches (v20NN-NN), never from main or an
# ad-hoc tag (F7: "main never releases"). A release is triggered when a regen lands
# on a version branch (gen.lock changes), or manually via workflow_dispatch.
#
# The dated version is computed here from the branch name + existing tags and applied
# to the git tag + GoReleaser ldflags — NOT to the Go module (F10). The module path
# stays unsuffixed; the binary reports the dated version via -X main.version.
#
# DRY MODE: this builds the release (version-compute, tag, archives) but does NOT
# publish — no tag push, no GitHub release, no Homebrew formula. Real publishing is
# enabled at the public-launch cutover (push the tag, drop --skip=publish, point the
# formula at wistia/homebrew-tap). A test gate (integration tests) is added later.

on:
  push:
    branches:
      - 'v20[0-9][0-9]-[0-9][0-9]'
    paths:
      - .speakeasy/gen.lock
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Compute dated release version
        id: version
        run: |
          version="$(scripts/compute-version.sh)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version} (branch ${GITHUB_REF_NAME})"

      - name: Create tag (local only — dry)
        run: |
          # GoReleaser derives the version from the tag at HEAD. We create it locally
          # so ldflags stamp the dated version, but do NOT push it (dry). Real mode
          # pushes the tag.
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "Release v${{ steps.version.outputs.version }}"

      - name: Run GoReleaser (dry — build, no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish,homebrew,announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-${{ steps.version.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 14
