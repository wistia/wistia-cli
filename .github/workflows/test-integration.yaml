name: Tests

# Reusable test workflow. Runs on PRs/pushes for fast feedback, and is called by
# the Release workflow (via workflow_call) so a release is gated on tests passing.
on:
  workflow_call:
    secrets:
      WISTIA_API_KEY:
        description: Wistia API key for live integration tests (Tier B).
        required: false
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Vet
        run: go vet ./test/...

      # Builds the CLI and runs it against an in-process httptest server.
      # No account, network, or secret required.
      - name: Test
        run: go test ./test/...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The npm launcher shim (npm/wistia-cli/bin/wistia) — platform mapping,
      # error messages, and spawn passthrough.
      - name: Shim tests
        run: node --test npm/wistia-cli/test/shim.test.js

  # Live tests hit the real Wistia API (a dedicated test account) and need the
  # secret, so they run on push/dispatch/release — not on PRs (which keeps the
  # PR gate fast and deterministic, and skips on forks where the secret is
  # unavailable). The release workflow calls this, so releases gate on it too.
  live:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Test
        run: go test -tags integration -run TestLive -v ./test/...
        env:
          WISTIA_API_KEY: ${{ secrets.WISTIA_API_KEY }}
          # Fail (don't skip) if the secret didn't reach this job.
          WISTIA_REQUIRE_LIVE: "1"
          # Tag our own live-test traffic so it's excludable from CLI adoption metrics.
          WISTIA_CLI_USER_AGENT_SUFFIX: ci
