name: Tests

# Reusable test workflow. Runs on PRs/pushes for fast feedback, and is called by
# the Release workflow (via workflow_call) so a release is gated on tests passing.
on:
  workflow_call:
    secrets:
      WISTIA_API_KEY:
        description: Wistia API key for live integration tests (Tier B).
        required: false
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Vet
        run: go vet ./test/...

      # Builds the CLI and runs it against an in-process httptest server.
      # No account, network, or secret required.
      - name: Test
        run: go test ./test/...

  # Live tests hit the real Wistia API (a dedicated test account) and need the
  # secret, so they run on push/dispatch/release — not on PRs (which keeps the
  # PR gate fast and deterministic, and skips on forks where the secret is
  # unavailable). The release workflow calls this, so releases gate on it too.
  live:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Test
        run: go test -tags integration -run TestLive ./test/...
        env:
          WISTIA_API_KEY: ${{ secrets.WISTIA_API_KEY }}
