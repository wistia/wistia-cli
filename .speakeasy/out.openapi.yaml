  /webinars:
    get:
      summary: List Webinars
      description: |
        Lists webinars belonging to the account. This endpoint can also be used to
        do a batch fetch based off of the hashed id.

        ## Requires api token with one of the following permissions
        ```
        Read all data
        ```
      tags:
        - Webinars
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: |
            The page number to retrieve. This cannot be combined with `cursor`,
            pagination.
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: The number of medias per page. Use this for both offset pagination and cursor pagination.
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          description: |
            If `cursor[enabled]` is set to 1 then cursor pagination is enabled and the
            first set of records are fetched up to the `per_page`. Cursor
            pagination will also be turned on if `cursor[before]` or `cursor[after]`
            are set. Records returned will have a `cursor` property set which can be used to fetch more records in the same `sort_by` ordering.
            The cursor value of the last record can be used to fetch records after the current result set and
            the cursor of the first record can be used to fetch records before the result set.

            NOTE: a cursor value is only valid if the `sort_by` value hasn't changed from the
            last fetch. For example, you cannot fetch using `sort_by` id and then pass that
            cursor value to a `sort_by` name.
          required: false
          style: deepObject
          schema:
            type: object
            unevaluatedProperties: false
            properties:
              enabled:
                type: integer
                enum:
                  - 0
                  - 1
                description: |
                  If `cursor[enabled]` is set to 1, the first result set will be fetched with cursor pagination enabled. This
                  values is ignored if `cursor[before]` or `cursor[after]` are set.
              before:
                type: string
                description: |
                  If `cursor[before]` is set then cursor pagination is enabled and all records
                  before the cursor up to the `per_page` are returned. This feature is useful for
                  fetching "new records", for example, in a "pull to refersh" feature when showing records in a descending
                  order.
              after:
                type: string
                description: |
                  If `cursor[after]` is set then cursor pagination is enabled and all records
                  after the cursor up to the `per_page` are returned.
        - name: sort_by
          in: query
          description: |
            Field to sort by. When using cursor pagination (see cursor param),
            only `id` and `scheduled_for` are supported.
          required: false
          schema:
            type: string
            enum:
              - scheduled_for
              - id
        - name: sort_direction
          in: query
          description: Sort direction (0 = desc, 1 = asc; default is 1)
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        - name: hashed_ids[]
          in: query
          description: Filter by specific webinars IDs
          required: false
          schema:
            type: array
            items:
              type: string
        - name: started
          in: query
          description: Filter by whether the webinar has started. Use "true" for webinars that have started, "false" for webinars that have not started yet
          required: false
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
      responses:
        "200":
          description: Successful response with a list of webinars
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    id:
                      type: string
                      examples:
                        - abc123def456
                      description: The hashed ID of the webinar
                    title:
                      type: string
                      examples:
                        - 'Wellness Session: Coping with Outie Memories'
                      description: The title of the webinar
                    description:
                      type:
                        - string
                        - "null"
                      examples:
                        - A comprehensive session on managing work-life balance
                      description: The description of the webinar
                    scheduled_for:
                      type:
                        - string
                        - "null"
                      examples:
                        - '2024-03-20T15:30:00-05:00'
                      format: date-time
                      description: The scheduled start time in W3C format with timezone
                    event_duration:
                      type:
                        - integer
                        - "null"
                      examples:
                        - 60
                      description: Duration of the webinar in minutes
                    time_zone:
                      type: string
                      examples:
                        - America/New_York
                      description: The IANA time zone identifier the webinar is scheduled in
                    lifecycle_status:
                      type: string
                      examples:
                        - scheduled
                      description: Current lifecycle status of the event
                    registration_status:
                      type: string
                      examples:
                        - published
                      description: Registration status of the event
                    created_at:
                      type: string
                      examples:
                        - '2024-03-15T10:30:00Z'
                      format: date-time
                      description: When the event was created (UTC)
                    updated_at:
                      type: string
                      examples:
                        - '2024-03-15T10:30:00Z'
                      format: date-time
                      description: When the event was last updated (UTC)
                    audience_link:
                      type: string
                      examples:
                        - >-
                          https://lumon-industries.wistia.com/live/events/abc123def456
                      description: Link for the audience to join the event
                    host_link:
                      type: string
                      examples:
                        - >-
                          https://lumon-industries.wistia.com/live/events/abc123def456/onair
                      description: Link for the host to manage the event
                    panelist_link:
                      type: string
                      examples:
                        - >-
                          https://lumon-industries.wistia.com/live/events/abc123def456/onair/a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      description: Link for panelists to join the event
                    folder:
                      oneOf:
                        - type: object
                          unevaluatedProperties: false
                          properties:
                            id:
                              type: string
                              description: A unique alphanumeric identifier for the record.
                            index_url:
                              type: string
                              description: |
                                A URL for fetching all the records of the given record type. You can pass hashed_ids as a param with multiple values
                                to do a batch fetch for this records type.
                            url:
                              type: string
                              description: A URL that can be used to fetch this record.
                          required:
                            - id
