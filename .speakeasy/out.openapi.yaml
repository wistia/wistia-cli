        SRT subtitle track) on a video for a specified ISO-639-2 language by

        supplying a new SRT file or its contents. Use this when someone wants to

        overwrite or correct an existing subtitle or caption track on a media. Use

        create-captions to add a new track, delete-captions to remove one, or

        get-captions to list tracks.

    delete:
      summary: Delete Captions
      description: |
