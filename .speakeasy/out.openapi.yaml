      x-speakeasy-group: channels
      x-speakeasy-name-override: list
      x-wistia-mcp-tool-name: get-channels
      x-wistia-mcp-description: >
        List, get, show, browse, or find all Wistia Channels in an account — each an

        embeddable video gallery, content hub, video showcase, or playlist page that

        groups videos into episodes. Supports pagination, sorting, and batch fetch by

        one or more hashed_ids. Use this when someone wants to see what channels or

        video galleries exist or look up a channel's hashed id. Use create-channel to

        make one, update-channel to edit, or get-channel-episodes to list a channel's

        videos.

