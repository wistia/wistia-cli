                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "404":
          description: Captions or video not found.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-mcp-annotations:
        read_only_hint: false
        read_only_hint_justification: This tool modifies an existing captions in the account.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only operates on records inside the account and does not reach external services.
