      x-wistia-mcp-annotations:
        read_only_hint: false
        read_only_hint_justification: This tool modifies an existing channel in the account.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only operates on records inside the account and does not reach external services.
        destructive_hint: true
        destructive_hint_justification: >-
          Updating replaces existing values and the previous data cannot be recovered.
        idempotent_hint: true
        idempotent_hint_justification: >-
          Re-sending the same update with identical attributes leaves the resource in the same state, so repeating the request has no additional effect.
      x-speakeasy-group: channels
      x-speakeasy-name-override: update
      x-wistia-mcp-tool-name: update-channel
      x-wistia-mcp-description: >
        Update, edit, change, rename, or reconfigure an existing Wistia Channel — an

        embeddable video gallery, content hub, or video showcase page that groups

        videos into episodes. Identify it by its channelHashedId; supplied values

        replace the existing ones. Use this when someone wants to modify a channel's

        name, appearance, or settings. Use get-channels to find the hashed id,

        create-channel to make a new one, or delete-channel to remove it.

    delete:
      summary: Delete Channel
      description: |
        Deletes a channel.
      tags:
        - Channels
      security:
        - BearerAuth: []
      parameters:
        - name: channelHashedId
          in: path
          description: The hashed id of the Channel
          required: true
