        open_world_hint: false
        open_world_hint_justification: >-
          This tool only operates on records inside the account and does not reach external services.
        destructive_hint: true
        destructive_hint_justification: This tool permanently deletes the subfolder and cannot be undone.
      x-speakeasy-group: subfolders
      x-speakeasy-name-override: delete
      x-wistia-mcp-tool-name: delete-subfolder
      x-wistia-mcp-description: >
        Delete or remove a single subfolder from a folder (previously called a "project"). A subfolder is a nested folder inside a folder. Use this when someone wants to delete or remove one subfolder. All media files (videos and audio) in the subfolder are moved to the folder's root level. The subfolder is soft-deleted and may be recoverable through other means, but is no longer accessible via the API. Use bulk-delete-subfolders to remove several at once, get-subfolders to list subfolders, create-subfolder to add one, or update-subfolder to rename one.

  /folders/{folderId}/subfolders/bulk_delete:
    delete:
      summary: Bulk Delete Subfolders
      description: |
        This method accepts a list of subfolders to delete. It processes requests asynchronously and will return a background_job_status object. All media files in each deleted subfolder will be moved to the folder's root level.

        ## Requires api token with one of the following permissions
        ```
        Read, update & delete anything
        ```
      tags:
        - Subfolders
      security:
        - BearerAuth: []
      parameters:
        - name: folderId
          in: path
          description: The hashed ID of the folder containing the subfolders
          required: true
          schema:
            type: string
            examples:
              - abc123def4
      requestBody:
        content:
          application/json:
            schema:
              type: object
              unevaluatedProperties: false
              properties:
                hashed_ids:
                  type: array
                  items:
                    type: string
                  description: An array of the subfolder hashed IDs to be deleted.
              required:
                - hashed_ids
        required: true
      responses:
        "200":
          description: Successful queuing of subfolder deletion.
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  message:
                    type: string
                    description: A confirmation message that the background job has been queued.
                  background_job_status:
                    type: object
                    unevaluatedProperties: false
                    properties:
                      id:
                        type: integer
                        description: The ID of the background job that's been queued for the request.
                      hashed_id:
                        type: string
                        description: The unguessable hashed ID of the background job. Prefer this over the numeric ID when polling for status.
                      status:
                        type: string
                        enum:
                          - queued
                          - started
                          - finished
                          - failed
                        description: The status of the background job that's been queued for the request.
                    required:
                      - id
                      - hashed_id
                      - status
                    description: |
                      A background job keeps track of the progress of an asynchronous task, e.g
                      bulk archiving media, translating media, etc.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Project with ID abc123def4 not found.
        "422":
          description: Unprocessable entity, e.g. missing required parameters.
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-mcp-annotations:
        read_only_hint: false
        read_only_hint_justification: This tool deletes subfolders, which modifies the account.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only operates on records inside the account and does not reach external services.
        destructive_hint: true
        destructive_hint_justification: These deletions are permanent and cannot be undone.
      x-speakeasy-group: subfolders
      x-speakeasy-name-override: bulkDelete
      x-wistia-mcp-tool-name: bulk-delete-subfolders
      x-wistia-mcp-description: >
        Delete or remove multiple subfolders at once from a folder (previously called a "project") in a single bulk operation. A subfolder is a nested folder inside a folder. Use this when someone wants to bulk delete, remove, or clean up several subfolders together. Accepts a list of subfolder hashed IDs, processes the deletions asynchronously, and returns a background_job_status object for the queued job. All media files (videos and audio) in each deleted subfolder are moved to the folder's root level. Use delete-subfolder to remove a single subfolder, get-subfolders to list subfolders, or create-subfolder to add one.

  /channels:
    get:
      summary: List Channels
      description: |
        Lists all Channels belonging to an account. This endpoint can also be used to
        do a batch fetch based off of the hashed id.

        ## Requires api token with one of the following permissions
        ```
        Read all folder and media data
        ```
      tags:
        - Channels
      security:
        - BearerAuth: []
      parameters:
        - name: cursor
          in: query
          description: |
            If `cursor[enabled]` is set to 1 then cursor pagination is enabled and the
            first set of records are fetched up to the `per_page`. Cursor
            pagination will also be turned on if `cursor[before]` or `cursor[after]`
            are set. Records returned will have a `cursor` property set which can be used to fetch more records in the same `sort_by` ordering.
            The cursor value of the last record can be used to fetch records after the current result set and
            the cursor of the first record can be used to fetch records before the result set.

            NOTE: a cursor value is only valid if the `sort_by` value hasn't changed from the
            last fetch. For example, you cannot fetch using `sort_by` id and then pass that
            cursor value to a `sort_by` name.
          required: false
          style: deepObject
          schema:
            type: object
            unevaluatedProperties: false
            properties:
              enabled:
                type: integer
                enum:
                  - 0
                  - 1
                description: |
                  If `cursor[enabled]` is set to 1, the first result set will be fetched with cursor pagination enabled. This
                  values is ignored if `cursor[before]` or `cursor[after]` are set.
              before:
                type: string
                description: |
                  If `cursor[before]` is set then cursor pagination is enabled and all records
                  before the cursor up to the `per_page` are returned. This feature is useful for
                  fetching "new records", for example, in a "pull to refersh" feature when showing records in a descending
                  order.
              after:
                type: string
                description: |
                  If `cursor[after]` is set then cursor pagination is enabled and all records
                  after the cursor up to the `per_page` are returned.
        - name: page
          in: query
          description: Page number to retrieve
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Number of channels per page
          required: false
          schema:
            type: integer
        - name: sort_by
          in: query
          description: |
            Ordering. Default is ID ASC.
            Note: Only 'id' and 'created' are supported when using cursor pagination.
          required: false
          schema:
            type: string
            enum:
              - created
              - id
              - updated
              - name
        - name: sort_direction
          in: query
          description: Ordering Sort Direction (0 = desc, 1 = asc; default is 1)
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        - name: hashed_ids[]
          in: query
          description: Find all of the channels limited to these hashed_ids.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
