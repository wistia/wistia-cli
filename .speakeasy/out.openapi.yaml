      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              unevaluatedProperties: false
              properties:
                hashed_ids:
                  type: array
                  items:
                    type: string
                  description: An array of the media hashed IDs to be tagged.
                tag_names:
                  type: array
                  items:
                    type: string
                  description: An array of tag names to add to each media.
              required:
