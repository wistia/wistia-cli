                            unevaluatedProperties: false
                            properties:
                              value:
                                type: string
                                description: The registrant's response.
                              label:
                                type: string
                                description: The form field label.
                          description: Custom form field responses submitted by the registrant.
                        utm_campaign:
                          type:
