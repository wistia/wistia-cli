                    description: Status of the new remix version.
                  previous_remix_id:
                    type: string
                    description: Hashed ID of the remix version this edit is based on.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
