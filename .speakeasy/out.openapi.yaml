openapi: 3.1.1
info:
  title: Data API
  version: edge-version
  description: Wistia Data API
paths:
  /:
    servers:
      - url: https://upload.wistia.com
    post:
      summary: Upload or Import Media
      description: |
        Endpoint to upload media files from a local system or import from a web URL.

        - Use `multipart/form-data` with a `file` parameter to upload from local system
        - Use `application/x-www-form-urlencoded` with a `url` parameter to import from web URL
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/CommonUploadProperties'
                - type: object
                  required:
                    - url
                  properties:
                    url:
                      description: The publicly accessible web location of the media file to import.
                      type: string
                      format: uri
                      examples:
                        - http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4
                    low_priority:
                      description: Inform the encoding service that this upload can be considered lower priority than others. This is especially useful for platform customers doing bulk uploads or migrations. Setting this to "false" has no effect.
                      type: boolean
                      examples:
                        - true
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/CommonUploadProperties'
                - type: object
                  required:
                    - file
                  properties:
                    file:
                      description: The media file, multipart-form encoded into the request body.
                      type: string
                      format: binary
      responses:
        '200':
          description: Successfully uploaded or imported.
          content:
            application/json:
              schema:
                description: Response after successfully uploading or importing media
                type: object
                properties:
                  id:
                    description: A unique numeric identifier for the media within the system.
                    type: integer
                  name:
                    description: The display name of the media.
                    type: string
                  type:
                    description: A string representing what type of media this is.
                    type: string
                  created:
                    description: The date when the media was originally uploaded.
                    type: string
                    format: date-time
                  updated:
                    description: The date when the media was last changed.
                    type: string
                    format: date-time
                  duration:
                    description: Specifies the length (in seconds) for audio and video files.
                    type: number
                  hashed_id:
                    description: A unique alphanumeric identifier for this media.
                    type: string
                  progress:
                    description: A floating point value between 0 and 1 that indicates the progress of the processing for this file.
                    type: number
                    maximum: 1
                    minimum: 0
                  thumbnail:
                    $ref: '#/components/schemas/Thumbnail'
        '400':
          description: Error due to reaching the video limit of your account or other issues.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      detail:
                        type: string
              examples:
                missing_credentials:
                  value:
                    code: upload_failed
                    detail: '''api_password'' or ''access_token'' are required'
        '401':
          description: Authorization error. Check your access_token.
          content:
            text/html: {}
      tags:
        - Upload or Import Media
      security:
        - BearerAuth: []
  /medias:
    get:
      summary: List Media
      description: |
        Lists the media belonging to the account. This endpoint can also be used to
        do a batch fetch based off of the hashed id.

        ## Requires api token with one of the following permissions
        ```
        Read all folder and media data
        ```
      tags:
        - Media
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: |
            The page number to retrieve. This cannot be combined with `cursor`,
            pagination.
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: The number of medias per page. Use this for both offset pagination and cursor pagination.
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          description: |
            If `cursor[enabled]` is set to 1 then cursor pagination is enabled and the
            first set of records are fetched up to the `per_page`. Cursor
            pagination will also be turned on if `cursor[before]` or `cursor[after]`
            are set. Records returned will have a `cursor` property set which can be used to fetch more records in the same `sort_by` ordering.
            The cursor value of the last record can be used to fetch records after the current result set and
            the cursor of the first record can be used to fetch records before the result set.

            NOTE: a cursor value is only valid if the `sort_by` value hasn't changed from the
            last fetch. For example, you cannot fetch using `sort_by` id and then pass that
            cursor value to a `sort_by` name.
          required: false
          style: deepObject
          schema:
            type: object
            unevaluatedProperties: false
            properties:
              enabled:
                type: integer
                enum:
                  - 0
                  - 1
                description: |
                  If `cursor[enabled]` is set to 1, the first result set will be fetched with cursor pagination enabled. This
                  values is ignored if `cursor[before]` or `cursor[after]` are set.
              before:
                type: string
                description: |
                  If `cursor[before]` is set then cursor pagination is enabled and all records
                  before the cursor up to the `per_page` are returned. This feature is useful for
                  fetching "new records", for example, in a "pull to refersh" feature when showing records in a descending
                  order.
              after:
                type: string
                description: |
                  If `cursor[after]` is set then cursor pagination is enabled and all records
                  after the cursor up to the `per_page` are returned.
        - name: sort_by
          in: query
          description: |
            Ordering. When using cursor pagination (see cursor param),
            only `id` and `created` are supported. All other sort_by options (`name`, `updated`, `position`)
            require offset pagination.
          required: false
          schema:
            type: string
            enum:
              - name
              - created
              - updated
              - position
        - name: sort_direction
          in: query
          description: Ordering Sort Direction (0 = desc, 1 = asc; default is 1)
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        - name: folder_id
          in: query
          description: A hashed ID specifying the folder from which you would like to get results.
          required: false
          schema:
            type: string
            description: Hashed ID of the folder (e.g., "4d23503f70")
        - name: name
          in: query
          description: Find a media or medias whose name exactly matches this parameter.
          required: false
          schema:
            type: string
        - name: description_format
          in: query
          description: Format for media descriptions
          required: false
          schema:
            type: string
            examples:
              - markdown
            const: markdown
        - name: type
          in: query
          description: A string specifying which type of media you would like to get.
          required: false
          schema:
            type: string
            enum:
              - Video
              - Audio
              - Image
              - PdfDocument
              - MicrosoftOfficeDocument
              - Swf
              - UnknownType
        - name: hashed_ids[]
          in: query
          description: Find all of the medias by these hashed_ids.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: tags[]
          in: query
          description: Find all of the medias that match all of these tag names.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: archived
          in: query
          description: Filter by archived status. True will return only archived medias, while false will return only active medias.
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - type: object
                      properties:
                        id:
                          type: integer
                          description: A unique numeric identifier for the media within the system.
                        name:
                          type: string
                          description: The display name of the media.
                        type:
                          type: string
                          enum:
                            - Video
                            - Audio
                            - Image
                            - PdfDocument
                            - MicrosoftOfficeDocument
                            - Swf
                            - UnknownType
                          description: A string representing what type of media this is.
                        archived:
                          type: boolean
                          description: Whether or not the media is archived, either true or false.
                        created:
                          type: string
                          format: date-time
                          description: The date when the media was originally uploaded.
                        updated:
                          type: string
                          format: date-time
                          description: The date when the media was last changed.
                        duration:
                          oneOf:
                            - type: number
                            - type: "null"
                          unevaluatedProperties: false
                          description: Specifies the length (in seconds) for audio and video files. Specifies number of pages in the document. Omitted for other types of media.
                        embedCode:
                          type: string
                          description: |
                            DEPRECATED: If you want to programmatically embed videos, follow the construct an embed code guide.
                          deprecated: true
                        hashed_id:
                          type: string
                          description: A unique alphanumeric identifier for this media.
                        description:
                          type: string
                          description: A description for the media which usually appears near the top of the sidebar on the media's page.
                        progress:
                          type: number
                          maximum: 1
                          minimum: 0
                          description: A floating point value between 0 and 1 that indicates the progress of the processing for this file.
                        status:
                          type: string
                          enum:
                            - queued
                            - processing
                            - ready
                            - failed
                          description: |
                            Post upload processing status. - `queued`: the file is waiting in the queue to be processed. - `processing`: the file is actively being processed. - `ready`: the file has been fully processed and is ready for embedding and viewing. - `failed`: the file was unable to be processed (usually a format or size error).
                        section:
                          oneOf:
                            - type: string
                            - type: "null"
                          unevaluatedProperties: false
                          description: The title of the section in which the media appears. This attribute is omitted if the media is not in a section (default).
                        thumbnail:
                          type: object
                          unevaluatedProperties: false
                          properties:
                            url:
                              type: string
                            width:
                              type: integer
                            height:
                              type: integer
                        protected:
                          type:
                            - boolean
                            - "null"
                          description: Whether the media is protected (e.g. requires a password or other authentication to view). Null if the media is not protected.
                      description: |
                        A media generally represents a video or an audio which can be embedded into your website.

                        CDN-backed medias are accessible using this url structure: https://fast.wistia.com/embed/medias/{hashed_id}.m3u8.
                        For more information, see https://docs.wistia.com/docs/asset-urls#getting-hls-assets.
                    - type: object
                      properties:
                        folder:
                          oneOf:
                            - type: object
                              unevaluatedProperties: false
                              properties:
                                id:
                                  type: integer
                                  examples:
                                    - 22570
                                  description: A unique numeric identifier for the folder within the system.
                                name:
                                  type: string
                                  examples:
                                    - My Folder Title
                                  description: The folder’s display name.
                                hashed_id:
                                  type: string
                                  examples:
                                    - 4d23503f70
                                  description: A private hashed id, uniquely identifying the folder within the system.
                            - type: "null"
                          unevaluatedProperties: false
                      required:
                        - folder
                    - type: object
                      properties:
                        assets:
                          type: array
                          items:
                            type: object
                            unevaluatedProperties: false
                            properties:
                              url:
                                type: string
                                description: A direct-access URL to the content of the asset.
                              width:
                                oneOf:
                                  - type: integer
                                  - type: "null"
                                unevaluatedProperties: false
                                description: The width of this specific asset, if applicable.
                              height:
                                oneOf:
                                  - type: integer
                                  - type: "null"
                                unevaluatedProperties: false
                                description: The height of this specific asset, if applicable.
                              file_size:
                                oneOf:
                                  - type: integer
                                  - type: "null"
                                unevaluatedProperties: false
                                description: The size of the asset file that’s referenced by url, measured in bytes.
                              content_type:
                                oneOf:
                                  - type: string
                                  - type: "null"
                                unevaluatedProperties: false
                                description: The asset’s content type.
                              type:
                                type: string
                                description: |
                                  The internal type of the asset, describing how the asset should be used. Values can include OriginalFile, FlashVideoFile, MdFlashVideoFile, HdFlashVideoFile, Mp4VideoFile, MdMp4VideoFile, HdMp4VideoFile, IPhoneVideoFile, StillImageFile, SwfFile, Mp3AudioFile, and LargeImageFile.
                          description: An array of the assets available for this media.
                    - type: object
                      properties:
                        subfolder:
                          allOf:
                            - type: object
                              properties:
                                hashed_id:
                                  type: string
                                  examples:
                                    - abc123def4
                                  description: A unique alphanumeric identifier for this subfolder.
                                name:
                                  type:
                                    - string
                                    - "null"
                                  examples:
                                    - Marketing Videos
                                  description: The display name of the subfolder.
                                description:
                                  type:
                                    - string
                                    - "null"
                                  examples:
                                    - >-
                                      Collection of all marketing and promotional videos
                                  description: A description for the subfolder.
                                position:
                                  type:
                                    - integer
                                    - "null"
                                  examples:
                                    - 1
                                  description: The position of this subfolder within its folder, used for ordering.
                                created:
                                  type:
                                    - string
                                    - "null"
                                  examples:
                                    - '2024-01-15T10:30:00+00:00'
                                  format: date-time
                                  description: The date when the subfolder was created.
                                updated:
                                  type:
                                    - string
                                    - "null"
                                  examples:
                                    - '2024-01-20T14:45:00+00:00'
                                  format: date-time
                                  description: The date when the subfolder was last modified.
                                cursor:
                                  type:
                                    - string
                                    - "null"
                                  description: A cursor for stable pagination based on current `sort_by` order. You can pass this to `cursor[before]` or `cursor[after]` as a parameter to fetch the records before or after this record in the same sort order. This is only populated if records were fetched with `cursor[enabled]`, or `cursor[before]` or `cursor[after]`.
                              required:
                                - hashed_id
                                - position
                                - created
                                - updated
                              description: A subfolder within a folder that contains media.
                          unevaluatedProperties: false
                          description: The subfolder (media group) in which the media appears. Null if the media is not in a subfolder.
                    - type: object
                      properties:
                        tags:
                          type: array
                          items:
                            type: object
                            unevaluatedProperties: false
                            properties:
                              name:
                                type: string
                                description: The display name of the tag.
                          description: Tags associated with this media.
                    - type: object
                      properties:
                        cursor:
                          type:
                            - string
                            - "null"
                          description: A cursor for stable pagination based on current `sort_by` order. You can pass this to `cursor[before]` or `cursor[after]` as a parameter to fetch the records before or after this record in the same sort order. This is only populated if records were fetched with `cursor[enabled]`, or `cursor[before]` or `cursor[after]`.
                  unevaluatedProperties: false
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Bad request
                    description: Error message detailing the reason for the bad request.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Array of error messages detailing the reasons for the bad request.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-mcp-annotations:
        read_only_hint: true
        read_only_hint_justification: >-
          This tool only reads medias from the account and does not modify any data.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only queries records inside the account and does not reach external services.
        destructive_hint: false
        destructive_hint_justification: This tool is read-only and does not make any changes.
      x-speakeasy-group: media
      x-speakeasy-name-override: list
      x-wistia-mcp-tool-name: get-medias
      x-wistia-mcp-description: >
        List, browse, or fetch media records (videos and audio files) in the account.

        Use this when someone wants a page of media, all media in a known folder, exact-name

        or exact-ID lookup, or structured filtering by folder, media type, tags, archived status,

        sorting, or pagination. Do not use this as the first step for keyword, topic, title,

        description, or transcript search; use the `search` tool for those content-finding

        requests, then use get-medias only if you need exact media records by hashed_id.

        For "all" or "how many" requests with structured filters, use `per_page: 100` and

        continue with `page` or `cursor` pagination while more results may exist. The default

        page size is 10, so never treat an unpaginated first response as a complete total.

        Returns a list of media records. In MCP responses, `per_page` is only the requested

        limit; use `returned_count` or the actual `content` length as the number of records

        returned in that response.

  /medias/{mediaHashedId}:
    get:
      summary: Show Media
      description: |
        Fetches a single media by its hashed id.

        ## Requires api token with one of the following permissions
        ```
        Read all folder and media data
        ```
      tags:
        - Media
      security:
        - BearerAuth: []
      parameters:
        - name: mediaHashedId
          in: path
          description: The hashed ID of the media.
          required: true
          schema:
            type: string
            description: Hashed ID of the media (e.g., "4d23503f70")
        - name: description_format
          in: query
          description: Format for media descriptions
          required: false
          schema:
            type: string
            examples:
              - markdown
            const: markdown
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      id:
                        type: integer
                        description: A unique numeric identifier for the media within the system.
                      name:
                        type: string
                        description: The display name of the media.
                      type:
                        type: string
                        enum:
                          - Video
                          - Audio
                          - Image
                          - PdfDocument
                          - MicrosoftOfficeDocument
                          - Swf
                          - UnknownType
                        description: A string representing what type of media this is.
                      archived:
                        type: boolean
                        description: Whether or not the media is archived, either true or false.
                      created:
                        type: string
                        format: date-time
                        description: The date when the media was originally uploaded.
                      updated:
                        type: string
                        format: date-time
                        description: The date when the media was last changed.
                      duration:
                        oneOf:
                          - type: number
                          - type: "null"
                        unevaluatedProperties: false
                        description: Specifies the length (in seconds) for audio and video files. Specifies number of pages in the document. Omitted for other types of media.
                      embedCode:
                        type: string
                        description: |
                          DEPRECATED: If you want to programmatically embed videos, follow the construct an embed code guide.
                        deprecated: true
                      hashed_id:
                        type: string
                        description: A unique alphanumeric identifier for this media.
                      description:
                        type: string
                        description: A description for the media which usually appears near the top of the sidebar on the media's page.
                      progress:
                        type: number
                        maximum: 1
                        minimum: 0
                        description: A floating point value between 0 and 1 that indicates the progress of the processing for this file.
                      status:
                        type: string
                        enum:
                          - queued
                          - processing
                          - ready
                          - failed
                        description: |
                          Post upload processing status. - `queued`: the file is waiting in the queue to be processed. - `processing`: the file is actively being processed. - `ready`: the file has been fully processed and is ready for embedding and viewing. - `failed`: the file was unable to be processed (usually a format or size error).
                      section:
                        oneOf:
                          - type: string
                          - type: "null"
                        unevaluatedProperties: false
                        description: The title of the section in which the media appears. This attribute is omitted if the media is not in a section (default).
                      thumbnail:
                        type: object
                        unevaluatedProperties: false
                        properties:
                          url:
                            type: string
                          width:
                            type: integer
                          height:
                            type: integer
                      protected:
                        type:
                          - boolean
                          - "null"
                        description: Whether the media is protected (e.g. requires a password or other authentication to view). Null if the media is not protected.
                    description: |
                      A media generally represents a video or an audio which can be embedded into your website.

                      CDN-backed medias are accessible using this url structure: https://fast.wistia.com/embed/medias/{hashed_id}.m3u8.
                      For more information, see https://docs.wistia.com/docs/asset-urls#getting-hls-assets.
                  - type: object
                    properties:
                      folder:
                        oneOf:
                          - type: object
                            unevaluatedProperties: false
                            properties:
                              id:
                                type: integer
                                examples:
                                  - 22570
                                description: A unique numeric identifier for the folder within the system.
                              name:
                                type: string
                                examples:
                                  - My Folder Title
                                description: The folder’s display name.
                              hashed_id:
                                type: string
                                examples:
                                  - 4d23503f70
                                description: A private hashed id, uniquely identifying the folder within the system.
                          - type: "null"
                        unevaluatedProperties: false
                    required:
                      - folder
                  - type: object
                    properties:
                      assets:
                        type: array
                        items:
                          type: object
                          unevaluatedProperties: false
                          properties:
                            url:
                              type: string
                              description: A direct-access URL to the content of the asset.
                            width:
                              oneOf:
                                - type: integer
                                - type: "null"
                              unevaluatedProperties: false
                              description: The width of this specific asset, if applicable.
                            height:
                              oneOf:
                                - type: integer
                                - type: "null"
                              unevaluatedProperties: false
                              description: The height of this specific asset, if applicable.
                            file_size:
                              oneOf:
                                - type: integer
                                - type: "null"
