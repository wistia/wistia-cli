                  background_job_status:
                    type: object
                    unevaluatedProperties: false
                    properties:
                      id:
                        type: integer
                        description: The ID of the background job that's been queued for the request.
                      hashed_id:
                        type: string
                        description: The unguessable hashed ID of the background job. Prefer this over the numeric ID when polling for status.
                      status:
                        type: string
                        enum:
                          - queued
                          - started
                          - finished
                          - failed
                        description: The status of the background job that's been queued for the request.
                    required:
                      - id
                      - hashed_id
                      - status
                    description: |
                      A background job keeps track of the progress of an asynchronous task, e.g
                      bulk archiving media, translating media, etc.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
