                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "403":
          description: Forbidden, e.g. account does not have access to archiving.
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
        "422":
