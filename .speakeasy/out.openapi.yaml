                      - tier
                      - name
                      - is_standard
                      - is_trial
                      - trial_expires_at
                    description: The account's current plan information
                  can_upload:
                    type: boolean
                    description: Whether the next upload will succeed. False when an inflexible media or storage limit has been reached.
                  upload_blocked_reason:
                    type:
                      - string
                      - "null"
                    description: |
                      The reason uploads are blocked, or null if uploads are allowed.
                      Known values: `reached_media_limit`, `reached_storage_limit`.
                  limits:
                    type:
                      - object
                      - "null"
                    unevaluatedProperties: false
                    properties:
                      primary_resource:
                        type: string
                        enum:
                          - storage
                          - media
                        description: The primary resource type for this plan's limits — "storage" for standard plans, "media" for legacy plans
                      media:
                        type: object
                        unevaluatedProperties: false
                        properties:
                          count:
                            type: integer
                            description: Current number of media in the account
                          flexible_limit:
                            type:
                              - integer
                              - "null"
                            description: Soft media limit (overage billed). Null if no soft limit.
                          inflexible_limit:
                            type:
                              - integer
                              - "null"
                            description: Hard media limit (uploads blocked). Null if no hard limit.
                        required:
                          - count
                          - flexible_limit
                          - inflexible_limit
                        description: Media count and limits
                      storage:
                        type: object
                        unevaluatedProperties: false
                        properties:
                          used_bytes:
                            type: integer
                            description: Current storage usage in bytes
                          flexible_limit_bytes:
                            type:
                              - integer
                              - "null"
                            description: Included storage limit in bytes. Null if unlimited.
                          inflexible_limit_bytes:
                            type:
                              - integer
                              - "null"
                            description: Hard storage cap in bytes. Null if no hard cap.
                        required:
                          - used_bytes
                          - flexible_limit_bytes
                          - inflexible_limit_bytes
                        description: Storage usage and limits in bytes (1 GB = 1,000,000,000 bytes)
                    required:
                      - primary_resource
                      - media
                      - storage
                    description: |
                      Usage and limit data. Null when the authenticated contact does not have
                      billing visibility (i.e. is not an account owner or manager).
                  links:
                    type: object
                    unevaluatedProperties: false
                    properties:
                      plans_url:
                        type: string
                        description: URL to the account's plans page. Always present.
                      usage_url:
                        type:
                          - string
                          - "null"
                        description: URL to the account's usage page. Null for non-owner/manager contacts.
                      billing_url:
                        type:
                          - string
                          - "null"
                        description: URL to the account's billing page. Null for non-owner/manager contacts.
                    required:
                      - plans_url
                      - usage_url
                      - billing_url
                    description: URLs for plan, usage, and billing pages
                required:
                  - plan
                  - can_upload
                  - upload_blocked_reason
                  - limits
                  - links
                description: |
                  Account usage and plan information, including storage and media limits.
                  Fields under `limits` are only visible to account owners and managers.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-openai-ignore: true
      x-wistia-anthropic-ignore: true
      x-wistia-mcp-annotations:
        read_only_hint: true
        read_only_hint_justification: >-
          This tool only reads account usage from the account and does not modify any data.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only queries records inside the account and does not reach external services.
        destructive_hint: false
        destructive_hint_justification: This tool is read-only and does not make any changes.
      x-speakeasy-group: account
      x-speakeasy-name-override: getUsage
      x-wistia-mcp-tool-name: get-account-usage
      x-wistia-mcp-description: >
        Get, show, or check the current account's plan, usage, limits, and quota: plan tier,

        billing details, upload eligibility, media counts, and storage usage (how much of the

        plan is used). Use this when someone asks about their plan, billing, quota, limits,

        remaining storage, or usage. For general account profile/name use get-current-account.

  /token:
    get:
      operationId: getTokenDetails
      summary: Get Current Token
      description: |
        Retrieves a summary of the token used to make the API request. This endpoint can primarily be used to
        debug permission issues with the API.
      tags:
        - Account
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  type:
                    type: string
                    enum:
                      - permanent
                      - expiring
                      - oauth
                    description: The type of token used.
                  application:
                    oneOf:
                      - type: object
                        unevaluatedProperties: false
                        properties:
                          name:
                            type: string
                            description: The name of the application.
                          scopes:
                            type: array
                            items:
                              type: string
                            description: The scopes of the application. These may be different than the token scope.
                        required:
                          - name
                          - scopes
                      - type: "null"
                    unevaluatedProperties: false
                    description: The application used by the token. Will be null if the token isn't an oauth token.
                  scopes:
                    type: array
                    items:
                      type: string
                    description: The scopes of the token.
                  name:
                    type:
                      - string
                      - "null"
                    description: The name of the token. This only applies to permanent tokens.
                  expires_at:
                    type:
                      - string
                      - "null"
                    format: iso8601
                    description: When the token expires. A null token means it never expires.
                required:
                  - type
                  - application
                  - scopes
                  - name
                description: |
                  The token used to make the API request. This is primarily for debugging
                  purposes. Sensitive data such as the token value is excluded.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-openai-ignore: true
      x-wistia-anthropic-ignore: true
      x-wistia-mcp-annotations:
        read_only_hint: true
        read_only_hint_justification: >-
          This tool only reads current token from the account and does not modify any data.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only queries records inside the account and does not reach external services.
        destructive_hint: false
        destructive_hint_justification: This tool is read-only and does not make any changes.
      x-speakeasy-group: account
      x-speakeasy-name-override: getTokenDetails
      x-cli-action-override: token
      x-wistia-mcp-tool-name: get-current-token
      x-wistia-mcp-description: >
        Get, show, or look up info about the API token, credential, or API key making the current

        request, including its scope, permissions, and owner. Use this when someone asks who the

        token belongs to, what scope or permissions the auth has, or to debug permission/authorization

        issues. For account profile use get-current-account; for plan and limits use get-account-usage.

  /search:
    get:
      summary: Search
      description: |
        Searches across folders, subfolders, medias, channels, channel episodes, and webinars.
        Also searches through video transcripts, so media results may include transcript matches with
        timestamps when the query matches spoken content.

        ## Requires api token with one of the following permissions
        ```
        Read all data
        ```
      tags:
        - Search
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: The search query string
          required: true
          schema:
            type: string
          example: screencast
        - name: tags[]
          in: query
          description: Filter results by one or more tag names. When multiple tags are provided, results matching any of the specified tags are returned (OR logic).
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: resource_type[]
          in: query
          description: Filter results by one or more resource types.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - media
                - folder
                - subfolder
                - channel
                - channel_episode
                - webinar
        - name: created_after
          in: query
          description: Filter results created on or after this datetime. Must be a valid ISO8601 timestamp in UTC (ending with 'Z').
          required: false
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: Filter results created on or before this datetime. Must be a valid ISO8601 timestamp in UTC (ending with 'Z').
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  data:
                    type: object
                    unevaluatedProperties: false
                    properties:
                      folders:
                        type: array
                        items:
                          type: object
                          unevaluatedProperties: false
                          properties:
                            id:
                              type: integer
                              examples:
                                - 22570
                              description: A unique numeric identifier for the folder within the system.
                            name:
                              type: string
                              examples:
                                - My Folder Title
                              description: The folder’s display name.
                            description:
                              type:
                                - string
                                - "null"
                              examples:
                                - About My Folder
                              description: The folder’s description.
                            media_count:
                              type: integer
                              examples:
                                - 2
                              description: The number of different medias that have been uploaded to the folder.
                            medias:
                              type: object
                              unevaluatedProperties: false
                              properties:
                                url:
                                  type: string
                                  description: A URL for fetching all child records of the parent record.
                              description: A link to where you can fetch the medias for this folder.
                            created:
                              type: string
                              examples:
                                - '2010-08-13T18:47:39+00:00'
                              format: date-time
                              description: The date that the folder was originally created.
                            updated:
                              type: string
                              examples:
                                - '2010-08-19T21:47:00+00:00'
                              format: date-time
                              description: The date that the folder was last updated.
                            hashed_id:
                              type: string
                              examples:
                                - 4d23503f70
                              description: A private hashed id, uniquely identifying the folder within the system.
                            public:
                              type: boolean
                              examples:
                                - false
                              description: A boolean indicating whether the folder is available for public (anonymous) viewing.
                            public_id:
                              type:
                                - string
                                - "null"
                              examples:
                                - 4bD
                              description: If the folder is public, this field contains a string representing the ID used for referencing the folder in public URLs.
                            anonymous_can_upload:
                              type: boolean
                              examples:
                                - false
                            anonymous_can_download:
                              type: boolean
                              examples:
                                - false
                            kind:
                              type: string
                              examples:
                                - shared
                              enum:
                                - library
                                - shared
                                - account
                              description: |
                                Indicates the folder's access scope, relative to the requesting user. One of:
                                - `library`: a library the requester owns. Libraries can still be shared with specific contacts or contact groups; the only restriction is that they cannot be shared with the whole account.
                                - `shared`: a folder the requester has access to via a Contact or ContactGroup sharing — this includes both shared folders and another contact's library that the requester has been granted access to.
                                - `account`: a folder shared with the whole account (everyone in the company can see it).
                            personal_library:
                              type: boolean
                              examples:
                                - false
                              description: |
                                Whether this folder is someone's personal library ("My Library"). Unlike `kind`, this is a property of the folder itself and does not depend on who is requesting — it is `true` for a personal library even when that library has been shared with you (where `kind` would read `shared`). Use this, not `kind`, to tell whether a folder is a personal library.
                            cursor:
                              type:
                                - string
                                - "null"
                              description: A cursor for stable pagination based on current `sort_by` order. You can pass this to `cursor[before]` or `cursor[after]` as a parameter to fetch the records before or after this record in the same sort order. This is only populated if records were fetched with `cursor[enabled]`, or `cursor[before]` or `cursor[after]`.
                          required:
                            - id
                            - name
                            - media_count
                            - created
                            - updated
                            - hashed_id
                            - public
                            - public_id
                            - kind
                            - personal_library
                            - medias
                          description: |
                            A folder (previously called a project) is a container in which to organize media into. It can be
                            used to set permissions that apply to all the media in the folder as well as
                            organizing media into subfolders (previously called media groups).
                      subfolders:
                        type: array
                        items:
