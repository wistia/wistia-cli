  /medias/{mediaHashedId}/captions/{languageCode}:
    get:
      summary: Show Captions
      description: |
        Returns a video's captions in the specified language.
        Supports multiple formats: JSON (default), SRT, VTT, and TXT.
        Use file extensions (.srt, .vtt, .txt) or Accept headers to specify format.

        ## Requires api token with one of the following permissions
        ```
        Read all folder and media data
        ```
      tags:
        - Captions
      security:
        - BearerAuth: []
      parameters:
        - name: mediaHashedId
          in: path
          description: The hashed ID of the media from which captions are to be retrieved.
          required: true
          schema:
            type: string
        - name: languageCode
          in: path
          description: The 3-character ISO 639-2 language code of the captions to be retrieved (e.g., `eng`, `fra`, `spa`). Some languages use extended IETF subtags (e.g., `zh-Hant`).
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response containing captions in the requested format
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  english_name:
                    type: string
                    description: English name of the language.
                  native_name:
                    type: string
                    description: Native name of the language.
                  language:
                    type: string
                    description: A 3 character language code as specified by ISO-639–2.
                  text:
                    type:
                      - string
                      - "null"
                    description: The text of the captions for the specified language in SRT format.
                  is_draft:
                    type: boolean
                  id:
                    type: string
                    description: The unique hashed identifier of the time-coded transcript.
                  cursor:
                    type:
                      - string
                      - "null"
                    description: A cursor for stable pagination based on current `sort_by` order. You can pass this to `cursor[before]` or `cursor[after]` as a parameter to fetch the records before or after this record in the same sort order. This is only populated if records were fetched with `cursor[enabled]`, or `cursor[before]` or `cursor[after]`.
                required:
                  - language
                  - is_draft
                  - id
            text/plain:
              schema:
                type: string
                description: Caption content in SRT or TXT format
            text/vtt:
              schema:
                type: string
                description: Caption content in VTT format
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "404":
          description: Captions not found or video not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-mcp-annotations:
        read_only_hint: true
        read_only_hint_justification: >-
          This tool only reads captions file from the account and does not modify any data.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only queries records inside the account and does not reach external services.
        destructive_hint: false
        destructive_hint_justification: This tool is read-only and does not make any changes.
      x-speakeasy-group: captions
      x-speakeasy-name-override: get
      x-wistia-mcp-tool-name: show-captions-file
      x-wistia-mcp-description: >
        Show, get, or fetch a video's caption track (subtitles / closed captions /

        CC) text in a specific ISO-639-2 language as JSON. Use this when someone

        wants to read or retrieve the actual subtitle/caption contents for one

        language. Use get-captions to list which caption tracks exist, or

        create-captions to add a new SRT track.

    put:
      summary: Update Captions
      description: |
        This method is for replacing the captions on a video for the specified language.

        ## Requires api token with one of the following permissions
        ```
        Read, update & delete anything
        ```
      tags:
        - Captions
      security:
        - BearerAuth: []
      parameters:
        - name: mediaHashedId
          in: path
          description: Unique identifier for the video.
          required: true
          schema:
            type: string
        - name: languageCode
          in: path
          description: Language code conforming to ISO-639-2 for which the captions should be updated.
          required: true
          schema:
            type: string
            pattern: ^[a-z]{3}$
      requestBody:
        content:
          application/json:
            schema:
              type: object
              unevaluatedProperties: false
              properties:
                caption_file:
                  type: string
                  description: Either an attached SRT file or a string parameter with the contents of an SRT file.
              required:
                - caption_file
          multipart/form-data:
            schema:
              type: object
              unevaluatedProperties: false
              properties:
                caption_file:
                  type: string
                  format: binary
                  description: Either an attached SRT file or a string parameter with the contents of an SRT file.
              required:
                - caption_file
        required: true
      responses:
        "200":
          description: Successful operation. Captions replaced.
