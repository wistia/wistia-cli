  /folders/{id}/copy:
    post:
      summary: Copy Folder
      description: |
        This copies a folder (previously called project) and all its media and subfolders asynchronously in a background job.

        This method does not copy the folder’s sharing information (i.e. users that could see the old folder will not automatically be able to see the new one).

        For the request you can specify the owner of a new folder by passing an optional parameter. The person you specify must be a Manager in the account.

        The body of the response will contain an object representing the background job that was created.

        ## Requires api token with one of the following permissions
        ```
        Read, update & delete anything
        ```
      tags:
        - Folders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: Folder Hashed ID
          required: true
          schema:
            type: string
            description: Hashed ID of the folder (e.g., "4d23503f70")
      requestBody:
        content:
          application/json:
            schema:
              type: object
              unevaluatedProperties: false
              properties:
                adminEmail:
                  type: string
                  examples:
                    - admin@example.com
                  description: The email address of the account Manager that will be the owner of the new folder. Defaults to the Account Owner if invalid or omitted.
      responses:
        "202":
          description: Folder queued to be copied
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  id:
                    type: integer
                    description: The ID of the background job that's been queued for the request.
                  hashed_id:
                    type: string
                    description: The unguessable hashed ID of the background job. Prefer this over the numeric ID when polling for status.
                  status:
                    type: string
                    enum:
                      - queued
                      - started
                      - finished
                      - failed
                    description: The status of the background job that's been queued for the request.
                required:
                  - id
                  - hashed_id
                  - status
                description: |
                  A background job keeps track of the progress of an asynchronous task, e.g
                  bulk archiving media, translating media, etc.
        "401":
          description: Unauthorized, invalid or missing token
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  code:
                    type: string
                    enum:
                      - unauthorized_credentials
                      - account_inactive
                      - unauthorized_scope
                      - unauthorized_params
                    description: A machine-readable identifier for the specific authorization failure.
                  error:
                    type: string
                    examples:
                      - Invalid credentials.
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Folder with ID 'fakeid' not found.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                unevaluatedProperties: false
                properties:
                  error:
                    type: string
                    examples:
                      - Internal server error
      x-wistia-mcp-annotations:
        read_only_hint: false
        read_only_hint_justification: This tool creates a new folder copy, which modifies the account.
        open_world_hint: false
        open_world_hint_justification: >-
          This tool only operates on records inside the account and does not reach external services.
        destructive_hint: false
        destructive_hint_justification: Copying only adds a new folder; existing folders are not modified.
      x-speakeasy-group: folders
      x-speakeasy-name-override: copy
      x-wistia-mcp-tool-name: copy-folder
      x-wistia-mcp-description: >
        Copy, duplicate, or clone a folder (previously called a "project") along with all its media and subfolders. Use this when someone wants to copy, duplicate, or clone an existing folder or project and its contents. The copy runs asynchronously in a background job, so the response contains an object representing the queued background job. Sharing information is NOT copied (users who could see the old folder will not automatically see the new one). You may pass an optional parameter to set the owner of the new folder, but the person specified must be a Manager in the account. Use create-folder to make an empty folder, update-folder to rename, get-folders to list folders, or create-folder-sharing to grant access to the copy.

  /folders/{folderId}/sharings:
    get:
      summary: List Folder Sharings
      description: |
        Lists the sharings of contacts and contact groups on a folder.

        ## Requires api token with one of the following permissions
        ```
        Read all data
        ```
      tags:
        - Folder Sharings
      security:
        - BearerAuth: []
      parameters:
        - name: folderId
          in: path
          description: Folder Hashed ID
          required: true
          schema:
            type: string
            description: Hashed ID of the folder (e.g., "4d23503f70")
        - name: page
          in: query
          description: |
            The page number to retrieve. This cannot be combined with `cursor`,
            pagination.
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: The number of medias per page. Use this for both offset pagination and cursor pagination.
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          description: |
            If `cursor[enabled]` is set to 1 then cursor pagination is enabled and the
            first set of records are fetched up to the `per_page`. Cursor
            pagination will also be turned on if `cursor[before]` or `cursor[after]`
            are set. Records returned will have a `cursor` property set which can be used to fetch more records in the same `sort_by` ordering.
            The cursor value of the last record can be used to fetch records after the current result set and
            the cursor of the first record can be used to fetch records before the result set.

            NOTE: a cursor value is only valid if the `sort_by` value hasn't changed from the
            last fetch. For example, you cannot fetch using `sort_by` id and then pass that
            cursor value to a `sort_by` name.
          required: false
          style: deepObject
          schema:
            type: object
            unevaluatedProperties: false
            properties:
              enabled:
                type: integer
                enum:
                  - 0
                  - 1
                description: |
                  If `cursor[enabled]` is set to 1, the first result set will be fetched with cursor pagination enabled. This
                  values is ignored if `cursor[before]` or `cursor[after]` are set.
              before:
                type: string
                description: |
                  If `cursor[before]` is set then cursor pagination is enabled and all records
                  before the cursor up to the `per_page` are returned. This feature is useful for
                  fetching "new records", for example, in a "pull to refersh" feature when showing records in a descending
                  order.
              after:
