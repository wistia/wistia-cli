# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: wistia
    main: ./cmd/wistia
    binary: wistia
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X github.com/wistia/wistia-cli/internal/useragent.Version={{.Version}}

archives:
  - id: wistia
    formats: [tar.gz]
    name_template: >-
      {{ .Binary }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

brews:
  - name: wistia-cli
    repository:
      owner: wistia
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/wistia/wistia-cli"
    description: "Data API: Wistia Data API"
    install: |
      bin.install "wistia"

release:
  github:
    owner: wistia
    name: wistia-cli
  draft: false
  prerelease: auto
  mode: append

checksum:
  name_template: "checksums.txt"
